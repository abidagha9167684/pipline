<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sun Plant App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sun-icon {
            font-size: 40px;
            animation: rotate 20s linear infinite;
        }

        .plant-icon {
            font-size: 40px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .plant-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .plant-item {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plant-info h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .plant-info p {
            color: #666;
            font-size: 14px;
        }

        .sun-meter {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
        }

        .sun-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-weight: bold;
            font-size: 12px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #764ba2;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 8px 15px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .add-plant {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-plant button {
            flex: 0 0 auto;
        }

        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stats p {
            margin: 5px 0;
            font-size: 14px;
        }

        .stats strong {
            font-size: 24px;
            display: block;
            margin: 10px 0;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="sun-icon">☀️</span>
            Sun Plant
            <span class="plant-icon">🌱</span>
        </h1>

        <div class="plant-section">
            <div id="plantsList"></div>
            <div class="add-plant">
                <input type="text" id="plantName" placeholder="Plant name (e.g., Tomato, Basil)">
                <button onclick="addPlant()">Add</button>
            </div>
        </div>

        <div class="stats">
            <p>Total Plants</p>
            <strong id="totalCount">0</strong>
            <p>Average Sunlight</p>
            <strong id="avgSunlight">0%</strong>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'sunPlantApp_plants';

        // Initialize with sample plants
        function initializeApp() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) {
                const samplePlants = [
                    { id: 1, name: 'Tomato', sunlight: 85 },
                    { id: 2, name: 'Basil', sunlight: 70 },
                    { id: 3, name: 'Lettuce', sunlight: 45 }
                ];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(samplePlants));
            }
            render();
        }

        function getPlants() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function savePlants(plants) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(plants));
        }

        function addPlant() {
            const input = document.getElementById('plantName');
            const name = input.value.trim();
            
            if (!name) {
                alert('Please enter a plant name');
                return;
            }

            const plants = getPlants();
            const newPlant = {
                id: Date.now(),
                name: name,
                sunlight: Math.floor(Math.random() * 100)
            };
            
            plants.push(newPlant);
            savePlants(plants);
            input.value = '';
            render();
        }

        function deletePlant(id) {
            if (confirm('Delete this plant?')) {
                const plants = getPlants().filter(p => p.id !== id);
                savePlants(plants);
                render();
            }
        }

        function updateSunlight(id, amount) {
            const plants = getPlants();
            const plant = plants.find(p => p.id === id);
            if (plant) {
                plant.sunlight = Math.max(0, Math.min(100, plant.sunlight + amount));
                savePlants(plants);
                render();
            }
        }

        function render() {
            const plants = getPlants();
            const list = document.getElementById('plantsList');

            if (plants.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>🌿 No plants yet. Add your first plant!</p></div>';
            } else {
                list.innerHTML = plants.map(plant => `
                    <div class="plant-item">
                        <div class="plant-info" style="flex: 1;">
                            <h3>${plant.name}</h3>
                            <div class="sun-meter">
                                <div class="sun-fill" style="width: ${plant.sunlight}%">${plant.sunlight}%</div>
                            </div>
                        </div>
                        <div class="controls">
                            <button onclick="updateSunlight(${plant.id}, -10)" style="padding: 8px 12px;">−</button>
                            <button onclick="updateSunlight(${plant.id}, 10)" style="padding: 8px 12px;">+</button>
                            <button class="delete-btn" onclick="deletePlant(${plant.id})">🗑</button>
                        </div>
                    </div>
                `).join('');
            }

            // Update stats
            document.getElementById('totalCount').textContent = plants.length;
            const avgSun = plants.length > 0 
                ? Math.round(plants.reduce((sum, p) => sum + p.sunlight, 0) / plants.length)
                : 0;
            document.getElementById('avgSunlight').textContent = avgSun + '%';
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
